<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Lista de Regalos</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
  :root {
    --cream:#FBF5EE; --card:#FFFFFF; --coral:#E07A5F; --coral-soft:#EBA793;
    --pink:#F2D2C9; --pink-bg:#FBE9E3; --taupe:#B9A493; --brown:#5B4A3F;
    --brown-soft:#8A7766; --line:#ECE0D6; --green:#7C9A75;
    --shadow:0 6px 22px rgba(91,74,63,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--cream);color:var(--brown);line-height:1.45;}
  #root{max-width:560px;margin:0 auto;padding:0 16px 90px;}

  .topbar{position:sticky;top:0;z-index:20;background:var(--cream);padding:20px 0 12px;border-bottom:1px solid var(--line);margin-bottom:18px;}
  .title-row{display:flex;align-items:center;gap:10px;}
  .title-row h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.3px;flex:1;}
  .gift-emoji{font-size:22px;}
  .subtitle{font-size:13px;color:var(--brown-soft);margin:4px 0 0;}
  .head-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:10px;}

  .role-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;background:var(--pink-bg);color:var(--coral);border:1px solid var(--pink);cursor:pointer;white-space:nowrap;}
  .role-pill.owner{background:#EEF3EC;color:var(--green);border-color:#D7E3D2;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
  .gift-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--pink-bg);cursor:zoom-in;}
  .gift-body{padding:14px 16px 16px;}
  .gift-name{font-size:17px;font-weight:700;margin:0 0 4px;}
  .gift-name.taken{text-decoration:line-through;color:var(--brown-soft);}
  .gift-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--coral);text-decoration:none;font-weight:600;margin-top:2px;}
  .badge-taken{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--green);background:#EEF3EC;padding:6px 12px;border-radius:999px;margin-top:10px;}

  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:700;margin-top:12px;transition:transform .05s ease;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--coral);color:#fff;}
  .btn-soft{background:var(--pink-bg);color:var(--coral);}
  .btn-ghost{background:transparent;color:var(--brown-soft);border:1px solid var(--line);}
  .btn-danger{background:#F6E4E0;color:#C25B45;}
  .btn-row{display:flex;gap:10px;}

  .fab{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--coral);color:#fff;font-weight:800;font-size:15px;padding:14px 24px;border-radius:999px;box-shadow:0 8px 24px rgba(224,122,95,.45);z-index:30;display:inline-flex;align-items:center;gap:8px;}

  .empty{text-align:center;padding:40px 20px;color:var(--brown-soft);}
  .empty .big{font-size:40px;margin-bottom:10px;}
  .small-muted{font-size:12px;color:var(--brown-soft);text-align:center;margin-top:18px;}

  .overlay{position:fixed;inset:0;background:rgba(91,74,63,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  .sheet{background:var(--cream);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:8px 18px 28px;max-height:92vh;overflow-y:auto;}
  .sheet-handle{width:42px;height:5px;background:var(--line);border-radius:999px;margin:8px auto 16px;}
  .sheet h2{font-size:19px;margin:0 0 16px;}
  label{display:block;font-size:13px;font-weight:700;color:var(--brown-soft);margin:14px 0 6px;}
  input[type=text],input[type=url],input[type=password]{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:16px;color:var(--brown);font-family:inherit;}
  input:focus{outline:2px solid var(--coral-soft);border-color:var(--coral-soft);}
  .photo-pick{border:2px dashed var(--pink);border-radius:14px;padding:20px;text-align:center;color:var(--coral);font-weight:600;background:var(--pink-bg);cursor:pointer;}
  .photo-preview{width:100%;aspect-ratio:16/10;object-fit:cover;border-radius:14px;cursor:pointer;}

  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:60;display:flex;align-items:center;justify-content:center;padding:20px;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:12px;}
  .err{color:#C25B45;font-size:13px;margin-top:8px;}
  svg{flex-shrink:0;}
</style>
</head>
<body>
<div id="root"><div class="empty"><div class="big">🎁</div>Cargando lista…</div></div>

<script>
/* ===========================================================
   CONFIGURACIÓN DE FIREBASE (ya puesta, no hace falta tocar)
   =========================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBAIac8987dP5Z1tSCtQ798PPskdTnvtgg",
  authDomain: "lista-regalos-41b76.firebaseapp.com",
  databaseURL: "https://lista-regalos-41b76-default-rtdb.firebaseio.com",
  projectId: "lista-regalos-41b76",
  storageBucket: "lista-regalos-41b76.firebasestorage.app",
  messagingSenderId: "773966005287",
  appId: "1:773966005287:web:6a4b20075654459d053a02"
};

const OWNER_CODE = "1965";   // cambiá este número si querés otro código de dueña
/* =========================================================== */

// --- Estado ---
let state = { title: "Lista de Regalos", gifts: {} };
let loaded = false;
let isOwner = false;
let confirmId = null;
let dbRef = null;

// --- Iconos ---
const ICON = {
  link:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  plus:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  key:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M10.5 12.5 19 4l2 2-2 2 2 2-3 1"/></svg>',
  eye:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>'
};

// --- Utilidades ---
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function normalizeLink(url){var u=(url||"").trim();if(!u)return"";return /^https?:\/\//i.test(u)?u:"https://"+u;}

function compressImage(file,maxW,quality){
  maxW=maxW||900; quality=quality||0.72;
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(e){
      var img=new Image();
      img.onload=function(){
        var scale=Math.min(1,maxW/img.width);
        var w=Math.round(img.width*scale), h=Math.round(img.height*scale);
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",quality));
      };
      img.onerror=reject; img.src=e.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

// --- Render principal de la lista ---
function renderApp(){
  var root=document.getElementById("root");
  if(!loaded){ root.innerHTML='<div class="empty"><div class="big">🎁</div>Cargando lista…</div>'; return; }

  var gifts=Object.keys(state.gifts).map(function(id){
    var g=state.gifts[id]; return {id:id,name:g.name,link:g.link,img:g.img,reserved:g.reserved,createdAt:g.createdAt||0};
  }).sort(function(a,b){return a.createdAt-b.createdAt;});

  var html='';
  html+='<div class="topbar">';
  html+= '<div class="title-row"><span class="gift-emoji">🎁</span><h1>'+esc(state.title)+'</h1></div>';
  html+= '<div class="head-bottom"><p class="subtitle">Marcá lo que vayas a regalar. Es anónimo 🤍</p>';
  html+= isOwner
    ? '<span class="role-pill owner" data-action="role">'+ICON.key+' Dueña</span>'
    : '<span class="role-pill" data-action="role">'+ICON.eye+' Invitado</span>';
  html+= '</div></div>';

  if(gifts.length===0){
    html+='<div class="empty"><div class="big">🎀</div>'+(isOwner?'Todavía no cargaste regalos. Tocá el botón de abajo para empezar.':'Todavía no hay regalos en la lista.')+'</div>';
  }

  gifts.forEach(function(g){
    html+='<div class="card">';
    if(g.img){ html+='<img class="gift-img" src="'+g.img+'" alt="'+esc(g.name)+'" data-action="lightbox" data-id="'+g.id+'">'; }
    html+='<div class="gift-body">';
    html+='<p class="gift-name'+(g.reserved?' taken':'')+'">'+esc(g.name)+'</p>';
    if(g.link){ html+='<a class="gift-link" href="'+esc(g.link)+'" target="_blank" rel="noopener noreferrer">'+ICON.link+' Ver dónde comprarlo</a>'; }
    if(g.reserved){ html+='<div class="badge-taken">'+ICON.check+' Ya alguien lo va a regalar</div>'; }

    if(!isOwner && !g.reserved){
      if(confirmId===g.id){
        html+='<div class="btn-row"><button class="btn btn-primary" data-action="reserve-yes" data-id="'+g.id+'">Sí, confirmar</button><button class="btn btn-ghost" data-action="reserve-cancel">Cancelar</button></div>';
      } else {
        html+='<button class="btn btn-primary" data-action="reserve-ask" data-id="'+g.id+'">Yo lo regalo</button>';
      }
    }
    if(isOwner){
      html+='<div class="btn-row"><button class="btn btn-soft" data-action="edit" data-id="'+g.id+'">Editar</button>';
      if(g.reserved){ html+='<button class="btn btn-ghost" data-action="release" data-id="'+g.id+'">Liberar</button>'; }
      html+='</div>';
    }
    html+='</div></div>';
  });

  if(!isOwner && gifts.length>0){
    html+='<p class="small-muted">¿Sos la organizadora? Tocá "Invitado" arriba para entrar en modo dueña.</p>';
  }
  if(isOwner){
    html+='<button class="fab" data-action="add">'+ICON.plus+' Agregar regalo</button>';
  }

  root.innerHTML=html;
}

// --- Acciones de Firebase ---
function saveGift(data){
  var id=data.id||genId();
  dbRef.child("gifts").child(id).set({
    name:(data.name||"").trim(),
    link:normalizeLink(data.link),
    img:data.img||"",
    reserved:data.reserved||false,
    createdAt:data.createdAt||Date.now()
  });
}
function deleteGift(id){ dbRef.child("gifts").child(id).remove(); }
function reserve(id,val){ dbRef.child("gifts").child(id).child("reserved").set(val); }

// --- Hojas (overlays) ---
function closeOverlay(){ var o=document.getElementById("overlay"); if(o) o.remove(); }

function openGiftSheet(gift){
  closeOverlay();
  var editing=!!gift;
  var current={img: gift?gift.img||"":""};
  var ov=document.createElement("div"); ov.id="overlay"; ov.className="overlay";
  ov.innerHTML=
    '<div class="sheet">'+
      '<div class="sheet-handle"></div>'+
      '<h2>'+(editing?'Editar regalo':'Agregar regalo')+'</h2>'+
      '<label>Nombre del regalo</label>'+
      '<input type="text" id="g-name" placeholder="Ej: Juego de mate" value="'+(gift?esc(gift.name):'')+'">'+
      '<label>Link para comprarlo (opcional)</label>'+
      '<input type="url" id="g-link" placeholder="Pegá un link de Mercado Libre, etc." value="'+(gift?esc(gift.link):'')+'">'+
      '<label>Foto (opcional)</label>'+
      '<div id="g-photo-area"></div>'+
      '<input type="file" id="g-file" accept="image/*" style="display:none">'+
      '<button class="btn btn-primary" id="g-save">'+(editing?'Guardar cambios':'Agregar a la lista')+'</button>'+
      (editing?'<button class="btn btn-danger" id="g-del">Borrar regalo</button>':'')+
      '<button class="btn btn-ghost" id="g-cancel">Cancelar</button>'+
    '</div>';
  document.body.appendChild(ov);

  function renderPhoto(){
    var area=document.getElementById("g-photo-area");
    area.innerHTML=current.img
      ? '<img class="photo-preview" id="g-prev" src="'+current.img+'">'
      : '<div class="photo-pick" id="g-pick">📷 Tocá para elegir una foto</div>';
    var pick=document.getElementById("g-pick"); if(pick) pick.onclick=function(){document.getElementById("g-file").click();};
    var prev=document.getElementById("g-prev"); if(prev) prev.onclick=function(){document.getElementById("g-file").click();};
  }
  renderPhoto();

  document.getElementById("g-file").onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    document.getElementById("g-photo-area").innerHTML='<div class="photo-pick">Procesando…</div>';
    compressImage(f).then(function(d){ current.img=d; renderPhoto(); }).catch(function(){ alert("No se pudo procesar la foto."); renderPhoto(); });
  };

  ov.onclick=function(e){ if(e.target===ov) closeOverlay(); };
  document.getElementById("g-cancel").onclick=closeOverlay;
  document.getElementById("g-save").onclick=function(){
    var name=document.getElementById("g-name").value;
    if(!name.trim()){ alert("Ponele un nombre al regalo."); return; }
    saveGift({ id:gift?gift.id:null, createdAt:gift?gift.createdAt:null, name:name, link:document.getElementById("g-link").value, img:current.img, reserved:gift?gift.reserved:false });
    closeOverlay();
  };
  if(editing){
    document.getElementById("g-del").onclick=function(){ if(confirm("¿Borrar este regalo?")){ deleteGift(gift.id); closeOverlay(); } };
  }
}

function openCodeSheet(){
  closeOverlay();
  var ov=document.createElement("div"); ov.id="overlay"; ov.className="overlay";
  if(isOwner){
    ov.innerHTML='<div class="sheet"><div class="sheet-handle"></div><h2>Modo dueña</h2><p class="subtitle">Estás en modo dueña: podés agregar, editar y borrar regalos.</p><button class="btn btn-ghost" id="c-exit">Salir del modo dueña</button><button class="btn btn-soft" id="c-stay">Seguir como dueña</button></div>';
    document.body.appendChild(ov);
    ov.onclick=function(e){ if(e.target===ov) closeOverlay(); };
    document.getElementById("c-stay").onclick=closeOverlay;
    document.getElementById("c-exit").onclick=function(){ isOwner=false; closeOverlay(); renderApp(); };
    return;
  }
  ov.innerHTML='<div class="sheet"><div class="sheet-handle"></div><h2>Modo dueña</h2><p class="subtitle">Ingresá el código para poder editar la lista. Los invitados no lo necesitan.</p><label>Código</label><input type="password" inputmode="numeric" id="c-code" placeholder="• • • •"><div id="c-err"></div><button class="btn btn-primary" id="c-go">Entrar</button><button class="btn btn-ghost" id="c-cancel">Cancelar</button></div>';
  document.body.appendChild(ov);
  ov.onclick=function(e){ if(e.target===ov) closeOverlay(); };
  document.getElementById("c-cancel").onclick=closeOverlay;
  document.getElementById("c-go").onclick=function(){
    if(document.getElementById("c-code").value===OWNER_CODE){ isOwner=true; closeOverlay(); renderApp(); }
    else { document.getElementById("c-err").innerHTML='<p class="err">Código incorrecto.</p>'; }
  };
}

function openLightbox(src){
  closeOverlay();
  var ov=document.createElement("div"); ov.id="overlay"; ov.className="lightbox";
  ov.innerHTML='<img src="'+src+'" alt="">';
  ov.onclick=closeOverlay;
  document.body.appendChild(ov);
}

// --- Delegación de clicks ---
document.body.addEventListener("click",function(e){
  var t=e.target.closest("[data-action]"); if(!t) return;
  var a=t.getAttribute("data-action"); var id=t.getAttribute("data-id");
  if(a==="role") openCodeSheet();
  else if(a==="add") openGiftSheet(null);
  else if(a==="edit") openGiftSheet(Object.assign({id:id},state.gifts[id]));
  else if(a==="release") reserve(id,false);
  else if(a==="reserve-ask"){ confirmId=id; renderApp(); }
  else if(a==="reserve-yes"){ reserve(id,true); confirmId=null; renderApp(); }
  else if(a==="reserve-cancel"){ confirmId=null; renderApp(); }
  else if(a==="lightbox"){ var g=state.gifts[id]; if(g&&g.img) openLightbox(g.img); }
});

// --- Arranque ---
(function boot(){
  try{
    firebase.initializeApp(firebaseConfig);
    dbRef=firebase.database().ref("lista");
    dbRef.on("value",function(snap){
      var v=snap.val()||{};
      state={ title:v.title||"Lista de Regalos", gifts:v.gifts||{} };
      loaded=true; renderApp();
    },function(err){
      loaded=true;
      document.getElementById("root").innerHTML='<div class="empty"><div class="big">⚠️</div>No se pudo conectar con la base. Revisá las reglas de Firebase.<br><small>'+esc(err&&err.message)+'</small></div>';
    });
  }catch(e){
    document.getElementById("root").innerHTML='<div class="empty"><div class="big">⚠️</div>Error al iniciar. '+esc(e&&e.message)+'</div>';
  }
})();
</script>
</body>
</html>
